name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure clean npm registry
        run: |
          # Override user-level npmrc with clean config
          cat > ~/.npmrc << 'EOF'
          registry=https://registry.npmjs.org/
          strict-ssl=true
          EOF
          # Remove any existing auth tokens from all npmrc locations
          npm config delete _auth 2>/dev/null || true
          npm config delete _authToken 2>/dev/null || true
          npm config delete //registry.npmjs.org/:_authToken 2>/dev/null || true
          npm config delete //packages.aliyun.com/:_authToken 2>/dev/null || true
          # Verify final config
          npm config list
          echo "---registry: $(npm config get registry)"

      - name: Install dependencies
        run: |
          # Remove lock files that may contain cached Aliyun mirror URLs
          rm -f ui/package-lock.json
          rm -f backend/package-lock.json
          # Clear npm cache to ensure fresh fetches from official registry
          npm cache clean --force
          npm install --registry https://registry.npmjs.org/ --prefer-offline=false
          npm install --prefix backend --registry https://registry.npmjs.org/ --prefer-offline=false
          npm install --prefix ui --registry https://registry.npmjs.org/ --prefer-offline=false

      - name: Build
        run: npm run build

      - name: Package distributable
        run: |
          VERSION=${GITHUB_REF_NAME:-${{ inputs.version }}}
          chmod +x scripts/package-release.sh
          ./scripts/package-release.sh "$VERSION"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: my-openclaw-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
