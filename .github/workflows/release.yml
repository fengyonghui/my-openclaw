name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Inspect all npm config sources
        run: |
          echo "=== ~/.npmrc ===" && cat ~/.npmrc
          echo "=== project .npmrc ===" && cat .npmrc
          echo "=== backend/.npmrc ===" && cat backend/.npmrc 2>/dev/null || echo "(not found)"
          echo "=== ui/.npmrc ===" && cat ui/.npmrc 2>/dev/null || echo "(not found)"
          echo "=== npm config ls -l ===" && npm config ls -l | grep -E "registry|@|auth|aliyun" | head -20

      - name: Install dependencies
        run: |
          rm -f ui/package-lock.json backend/package-lock.json
          npm cache clean --force
          npm install --registry https://registry.npmjs.org/
          npm install --prefix backend --registry https://registry.npmjs.org/
          npm install --prefix ui --registry https://registry.npmjs.org/

      - name: Build
        run: npm run build

      - name: Package distributable
        run: |
          VERSION=${GITHUB_REF_NAME:-${{ inputs.version }}}
          chmod +x scripts/package-release.sh
          ./scripts/package-release.sh "$VERSION"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: my-openclaw-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
