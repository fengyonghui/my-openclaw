name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          # Delete lock files that may contain Aliyun tarball URLs
          rm -f backend/package-lock.json ui/package-lock.json
          # Delete entire npm cache to force fresh fetches
          rm -rf ~/.npm/_cacache
          # Root install (small, ~concurrently only)
          npm install --registry https://registry.npmjs.org/ --no-package-lock
          # Backend install - prefer-offline=false forces fresh registry fetch
          npm install --prefix backend --registry https://registry.npmjs.org/ --prefer-offline=false
          # UI install
          npm install --prefix ui --registry https://registry.npmjs.org/ --prefer-offline=false

      - name: Build
        run: npm run build

      - name: Package distributable
        run: |
          VERSION=${GITHUB_REF_NAME:-${{ inputs.version }}}
          chmod +x scripts/package-release.sh
          ./scripts/package-release.sh "$VERSION"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: my-openclaw-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
