name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Inspect all npm config sources
        run: |
          echo "=== project .npmrc ===" && cat .npmrc 2>/dev/null || echo "(not found)"
          echo "=== backend/.npmrc ===" && cat backend/.npmrc 2>/dev/null || echo "(not found)"
          echo "=== ui/.npmrc ===" && cat ui/.npmrc 2>/dev/null || echo "(not found)"
          echo "=== npm config ls -l (registry/auth only) ===" && npm config ls -l | grep -iE "registry|auth|token|@.*registry|aliyun|mirror" || echo "(no matches)"

      - name: Install root + backend (verbose debug)
        run: |
          rm -f ui/package-lock.json backend/package-lock.json
          npm cache clean --force
          # Root install with verbose log
          npm install --registry https://registry.npmjs.org/ --loglevel verbose > /tmp/npm-root.log 2>&1 || true
          # Backend install with verbose log
          npm install --prefix backend --registry https://registry.npmjs.org/ --loglevel verbose > /tmp/npm-backend.log 2>&1 || true
          echo "=== ROOT LOG (last 10 lines) ===" && tail -10 /tmp/npm-root.log
          echo "=== BACKEND LOG (last 10 lines) ===" && tail -10 /tmp/npm-backend.log
          echo "=== BACKEND LOG (http lines) ===" && grep -iE "http|registry|fetch|401|error" /tmp/npm-backend.log | head -20

      - name: Upload debug logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-debug-logs
          path: /tmp/npm-*.log

      - name: Install UI dependencies
        if: always()
        run: |
          npm install --prefix ui --registry https://registry.npmjs.org/

      - name: Build
        run: npm run build

      - name: Package distributable
        run: |
          VERSION=${GITHUB_REF_NAME:-${{ inputs.version }}}
          chmod +x scripts/package-release.sh
          ./scripts/package-release.sh "$VERSION"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: my-openclaw-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
