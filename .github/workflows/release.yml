name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Force official npm registry at all levels
        run: |
          # Override user-level npmrc (which has Aliyun configured)
          echo 'registry=https://registry.npmjs.org/' > ~/.npmrc
          echo 'strict-ssl=true' >> ~/.npmrc
          # Also create project-level override
          echo 'registry=https://registry.npmjs.org/' > .npmrc
          # Verify
          npm config get registry

      - name: Install dependencies
        run: |
          npm install
          npm install --prefix backend
          npm install --prefix ui

      - name: Build
        run: npm run build

      - name: Package distributable
        run: |
          VERSION=${GITHUB_REF_NAME:-${{ inputs.version }}}
          chmod +x scripts/package-release.sh
          ./scripts/package-release.sh "$VERSION"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: my-openclaw-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
