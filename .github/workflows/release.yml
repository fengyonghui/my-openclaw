name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .npmrc files
        run: |
          echo 'registry=https://registry.npmjs.org/' > backend/.npmrc
          echo 'registry=https://registry.npmjs.org/' > ui/.npmrc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: npm install --prefix backend

      - name: Install UI dependencies
        run: npm install --prefix ui

      - name: Build
        run: npm run build

      - name: Package distributable
        run: |
          VERSION=${GITHUB_REF_NAME:-${{ inputs.version }}}
          chmod +x scripts/package-release.sh
          ./scripts/package-release.sh "$VERSION"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: my-openclaw-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
