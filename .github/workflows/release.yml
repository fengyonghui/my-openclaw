name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Diagnose npm environment
        run: |
          echo "=== All env vars containing registry/npm/aliyun ==="
          env | grep -iE "npm|registry|aliyun|npmjs" || echo "(none found)"
          echo "=== npm config list ==="
          npm config list
          echo "=== npm config get registry ==="
          npm config get registry
          echo "=== system npmrc ==="
          cat /etc/npmrc 2>/dev/null || echo "(none)"
          echo "=== npm cache location ==="
          npm config get cache

      - name: Install dependencies
        run: |
          rm -f backend/package-lock.json ui/package-lock.json
          rm -rf /tmp/npm-fresh-cache
          mkdir -p /tmp/npm-fresh-cache
          npm install --registry https://registry.npmjs.org/ --no-package-lock
          npm install --prefix backend --registry https://registry.npmjs.org/
          npm install --prefix ui --registry https://registry.npmjs.org/
        env:
          npm_config_cache: /tmp/npm-fresh-cache

      - name: Build
        run: npm run build

      - name: Package distributable
        run: |
          VERSION=${GITHUB_REF_NAME:-${{ inputs.version }}}
          chmod +x scripts/package-release.sh
          ./scripts/package-release.sh "$VERSION"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: my-openclaw-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
