name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js (no npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: false  # Disable built-in npm cache that persists across runs

      - name: Install dependencies
        run: |
          rm -f backend/package-lock.json ui/package-lock.json
          rm -rf ~/.npm/_cacache
          npm install --registry https://registry.npmjs.org/ --no-package-lock
          npm install --prefix backend --registry https://registry.npmjs.org/ --prefer-offline=false
          npm install --prefix ui --registry https://registry.npmjs.org/ --prefer-offline=false

      - name: Upload npm debug logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-debug-logs
          path: /home/runner/.npm/_logs/
          retention-days: 1

      - name: Build
        run: npm run build

      - name: Package distributable
        run: |
          VERSION=${GITHUB_REF_NAME:-${{ inputs.version }}}
          chmod +x scripts/package-release.sh
          ./scripts/package-release.sh "$VERSION"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: my-openclaw-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
