name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.1.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure npm for public packages
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config delete username || true
          npm config delete _auth || true
          npm config delete _authToken || true

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: npm install --prefix backend --registry https://registry.npmjs.org/

      - name: Install UI dependencies
        run: npm install --prefix ui --registry https://registry.npmjs.org/

      - name: Build
        run: npm run build

      - name: Package distributable
        run: |
          VERSION=${GITHUB_REF_NAME:-${{ inputs.version }}}
          chmod +x scripts/package-release.sh
          ./scripts/package-release.sh "$VERSION"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: my-openclaw-*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
